services:
  db:
    image: postgres:16-alpine
    container_name: fridge-ai-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fridge
      POSTGRES_PASSWORD: fridge_local_pw
      POSTGRES_DB: fridge_ai
    ports:
      - "5432:5432"
    volumes:
      - fridge_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fridge -d fridge_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  fridge_pgdata:
